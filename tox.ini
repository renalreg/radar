[tox]
# These are the environments that tox will create/run
envlist = ruff, pytest, ruff-lint

# This is an application, not a library, so we don't need to treat it as one
skipsdist = True

# This section provides default settings for the environments above
[testenv]
allowlist_externals = poetry
commands =
    poetry install -v

[testenv:ruff]
description = 'Check code style with Black'
commands = poetry run ruff format . --check

[testenv:pytest]
description = MyPy Type Checking
commands =
	poetry run pytest tests/

[testenv:ruff-lint]
description = 'Execute static analysis with pylint.'
commands = poetry run ruff check .

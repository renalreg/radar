[tox]
envlist = pytest, flake8, mypy

[testenv]
basepython = python3.10
deps =
    pip<24.1
    setuptools<70
    -r{toxinidir}/dev-requirements.txt

[testenv:pytest]
usedevelop = True
commands =
  py.test tests \
    --durations=10 \
    --cov radar \
    --cov-config .coveragerc \
    --cov-report html \
    --cov-report term

[testenv:flake8]
commands =
  flake8 radar setup.py tests
  
[testenv:mypy]
description = 'Execute static analysis with mypy.'
skip_install = true
commands = poetry run mypy radar/

[flake8]
max-line-length = 120
application-import-names = radar,tests
import-order-style = google
